<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HK Route ETA</title>
    <link rel="stylesheet" href="./styles.css?v=uber-links" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">菜菜整俾牛牛搭車用</p>
          <h1 id="app-title">實時到站數據</h1>
        </div>
        <div class="top-actions" aria-label="Quick actions">
          <div class="uber-actions" aria-label="Uber destinations">
            <p class="quick-note">趕唔切就搭Uber</p>
            <div class="uber-links">
              <a class="quick-link uber-link" href="https://m.uber.com/ul/?action=setPickup&amp;dropoff[latitude]=22.447459&amp;dropoff[longitude]=114.169128&amp;dropoff[nickname]=Tai%20Po%20Commercial%20Centre" target="_blank" rel="noopener noreferrer" aria-label="Uber返大埔">
                <img class="uber-icon" src="./assets/uber-icon.png" alt="" aria-hidden="true" />
                <span class="quick-label">返大埔</span>
              </a>
              <a class="quick-link uber-link" href="https://m.uber.com/ul/?action=setPickup&amp;dropoff[latitude]=22.3112134&amp;dropoff[longitude]=114.1710258&amp;dropoff[nickname]=Wing%20Sing%20Lane%20Yau%20Ma%20Tei" target="_blank" rel="noopener noreferrer" aria-label="Uber返油麻地">
                <img class="uber-icon" src="./assets/uber-icon.png" alt="" aria-hidden="true" />
                <span class="quick-label">返油麻地</span>
              </a>
              <a class="quick-link uber-link" href="https://m.uber.com/ul/?action=setPickup&amp;dropoff[latitude]=22.31882&amp;dropoff[longitude]=114.17285&amp;dropoff[nickname]=MacPherson%20Place" target="_blank" rel="noopener noreferrer" aria-label="Uber返菜牛">
                <img class="uber-icon" src="./assets/uber-icon.png" alt="" aria-hidden="true" />
                <span class="quick-label">返🥬🐮</span>
              </a>
            </div>
          </div>
          <a class="quick-link" href="https://wa.me/+85264368695" target="_blank" rel="noopener noreferrer" aria-label="搵菜菜 on WhatsApp">
            <span class="quick-label">搵菜菜</span>
          </a>
          <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh arrivals" title="Refresh arrivals">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
      </section>

      <section class="preset-panel" aria-label="Trip choices">
        <div id="presetButtons" class="preset-sections"></div>
      </section>

      <section class="status-band" aria-live="polite">
        <div>
          <p id="routeName" class="route-name">Loading route...</p>
          <p id="stopName" class="stop-name"></p>
          <p id="lastUpdated" class="muted">Fetching live arrivals</p>
        </div>
        <div id="clock" class="clock"></div>
      </section>

      <section id="reminderPanel" class="reminder-panel" data-status="idle" aria-live="polite">
        <p class="reminder-title">未揀車</p>
        <p class="reminder-copy">Click an arrival to target that bus.</p>
      </section>

      <section id="etaList" class="eta-list" aria-label="Arrivals"></section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
